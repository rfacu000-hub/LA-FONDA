<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Fonda</title>

<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body{
font-family:'MedievalSharp';
background:#0f0f0f;
color:#e8d8a8;
margin:0;
}

header{
background:#2b1d0e;
padding:20px;
text-align:center;
font-size:32px;
border-bottom:4px solid #6b4b1c;
}

nav{
display:flex;
justify-content:center;
gap:20px;
padding:15px;
background:#1a1208;
}

button{
background:linear-gradient(#7a5425,#4d3213);
border:2px solid #3b260e;
padding:10px 18px;
color:#fff2cc;
border-radius:6px;
cursor:pointer;
}

section{
display:none;
padding:20px;
}

input,select{
padding:8px;
margin:5px;
background:#222;
color:white;
border:1px solid #6b4b1c;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

td,th{
border:1px solid #6b4b1c;
padding:10px;
text-align:center;
}

.ticket{
background:#1a1208;
padding:15px;
margin-top:15px;
white-space:pre-line;
border:2px solid #6b4b1c;
}

.total{
font-size:20px;
margin-top:20px;
}

</style>
</head>

<body>

<header>🍖 LA FONDA 🍺</header>

<nav>
<button onclick="mostrar('productos')">Productos</button>
<button onclick="mostrar('ventas')">Ventas</button>
<button onclick="mostrar('historial')">Historial del Día</button>
</nav>

<!-- PRODUCTOS -->

<section id="productos">

<h2>Crear Producto</h2>

<input id="nombre" placeholder="Nombre">
<input id="costo" type="number" placeholder="Costo">
<input id="precio" type="number" placeholder="Precio">

<button onclick="guardarProducto()">Guardar</button>

<table id="tablaProductos">
<tr>
<th>Producto</th>
<th>Costo</th>
<th>Precio</th>
<th>Ganancia</th>
<th>Borrar</th>
</tr>
</table>

</section>

<!-- VENTAS -->

<section id="ventas">

<h2>Nueva Venta</h2>

<select id="productoVenta"></select>

<input type="number" id="cantidad" value="1" min="1">

<h3>Extras</h3>

<label><input type="checkbox" value="Ketchup">Ketchup</label>
<label><input type="checkbox" value="Mayonesa">Mayonesa</label>
<label><input type="checkbox" value="Mostaza">Mostaza</label>
<label><input type="checkbox" value="Cheddar">Cheddar</label>

<br><br>

<button onclick="finalizarVenta()">Finalizar Venta</button>

<div class="ticket" id="ticket"></div>

<br>

<button onclick="enviarWhatsApp()">Enviar Ticket por WhatsApp</button>

</section>

<!-- HISTORIAL -->

<section id="historial">

<h2>Ventas del Día</h2>

<table id="tablaHistorial">
<tr>
<th>Hora</th>
<th>Producto</th>
<th>Cantidad</th>
<th>Total</th>
</tr>
</table>

<div class="total">
Ventas Totales: $<span id="totalVentas">0</span><br>
Costos Totales: $<span id="totalCostos">0</span><br>
Ganancia: $<span id="ganancia">0</span>
</div>

</section>

<script>

let productos = JSON.parse(localStorage.getItem("productos")) || []

let hoy = new Date().toLocaleDateString()

let ventas = JSON.parse(localStorage.getItem("ventas_"+hoy)) || []

function mostrar(sec){

document.querySelectorAll("section").forEach(s=>s.style.display="none")

document.getElementById(sec).style.display="block"

actualizarProductos()

if(sec=="historial") actualizarHistorial()

}

function guardarProducto(){

let nombre=document.getElementById("nombre").value
let costo=parseFloat(document.getElementById("costo").value)
let precio=parseFloat(document.getElementById("precio").value)

productos.push({nombre,costo,precio})

localStorage.setItem("productos",JSON.stringify(productos))

actualizarProductos()

}

function actualizarProductos(){

let tabla=document.getElementById("tablaProductos")
let select=document.getElementById("productoVenta")

tabla.innerHTML="<tr><th>Producto</th><th>Costo</th><th>Precio</th><th>Ganancia</th><th>Borrar</th></tr>"
select.innerHTML=""

productos.forEach((p,i)=>{

tabla.innerHTML+=`
<tr>
<td>${p.nombre}</td>
<td>$${p.costo}</td>
<td>$${p.precio}</td>
<td>$${p.precio-p.costo}</td>
<td><button onclick="borrar(${i})">X</button></td>
</tr>
`

select.innerHTML+=`<option value="${i}">${p.nombre}</option>`

})

}

function borrar(i){

productos.splice(i,1)

localStorage.setItem("productos",JSON.stringify(productos))

actualizarProductos()

}

function finalizarVenta(){

let index=document.getElementById("productoVenta").value
let cantidad=parseInt(document.getElementById("cantidad").value)

let producto=productos[index]

let total=producto.precio*cantidad
let costo=producto.costo*cantidad

let hora=new Date().toLocaleTimeString()

let extras=[]

document.querySelectorAll("input[type=checkbox]:checked").forEach(e=>extras.push(e.value))

ventas.push({
hora:hora,
producto:producto.nombre,
cantidad:cantidad,
total:total,
costo:costo
})

localStorage.setItem("ventas_"+hoy,JSON.stringify(ventas))

let ticket=`LA FONDA

Producto: ${producto.nombre}
Cantidad: ${cantidad}

Extras:
${extras.join(", ") || "Ninguno"}

Total: $${total}

Gracias por su compra
`

document.getElementById("ticket").innerText=ticket

document.getElementById("cantidad").value=1

document.querySelectorAll("input[type=checkbox]").forEach(e=>e.checked=false)

}

function enviarWhatsApp(){

let texto=document.getElementById("ticket").innerText

let url="https://wa.me/?text="+encodeURIComponent(texto)

window.open(url)

}

function actualizarHistorial(){

ventas = JSON.parse(localStorage.getItem("ventas_"+hoy)) || []

let tabla=document.getElementById("tablaHistorial")

tabla.innerHTML="<tr><th>Hora</th><th>Producto</th><th>Cantidad</th><th>Total</th></tr>"

let totalVentas=0
let totalCostos=0

ventas.forEach(v=>{

tabla.innerHTML+=`
<tr>
<td>${v.hora}</td>
<td>${v.producto}</td>
<td>${v.cantidad}</td>
<td>$${v.total}</td>
</tr>
`

totalVentas+=v.total
totalCostos+=v.costo

})

document.getElementById("totalVentas").innerText=totalVentas
document.getElementById("totalCostos").innerText=totalCostos
document.getElementById("ganancia").innerText=totalVentas-totalCostos

}

mostrar("productos")

</script>

</body>
</html>
